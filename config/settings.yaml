# Base Configuration - settings.yaml

app:
  name: "Data Layer Manager"
  version: "0.0.4"
  api_key: "dev-secret-key"

embeddings:
  provider: "openai"
  model_name: "text-embedding-3-small"
  dimension: 1536
  batch_size: 32

chunking:
  strategy: "fixed"
  default_size: 500
  default_overlap: 50

vector_store:
  backend: "pgvector"

qdrant:
  url: "http://localhost:6333"
  collection_name: "chunks"

database:
  db_type: "postgresql"

graph_store:
  backend: "neo4j"

neo4j:
  url: "bolt://localhost:7687"
  username: "neo4j"
  password: "password"

reranking:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  limit: 10
