# Base Configuration - settings.yaml

app:
  name: "Data Layer Manager"
  version: "0.0.2"

embeddings:
  provider: "huggingface"
  model_name: "all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 32

chunking:
  strategy: "fixed"
  default_size: 500
  default_overlap: 50

vector_store:
  backend: "pgvector"

qdrant:
  url: "http://localhost:6333"
  collection_name: "chunks"

database:
  db_type: "postgresql"

reranking:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  limit: 10
